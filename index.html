<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #131313;
    --card: #1a1a1a;
    --accent: #ffa238;
    --accent-2: #6babff;
    --line: #2c2c2c;
    --text: #f2f2f0;
    --muted: #8a8a86;
  }

  *{ box-sizing: border-box; }

  html, body{
    height: 100%;
    margin: 0;
  }

  body{
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 15%, rgba(255,162,56,0.05), transparent 40%),
      radial-gradient(circle at 80% 85%, rgba(107,171,255,0.05), transparent 40%);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .stage{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }

  .scene{
    width: 380px;
    max-width: 86vw;
    aspect-ratio: 1.75 / 1;
    perspective: 1600px;
  }

  .card{
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(.22,.85,.32,1.15);
    cursor: pointer;
  }

  .scene.flipped .card{
    transform: rotateY(180deg);
  }

  .face{
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 14px;
    border: 1px solid var(--line);
    background: var(--card);
    padding: 28px 30px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6);
    overflow: hidden;
  }

  .face::before{
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
  }

  /* ---------- FRONT ---------- */
  .front{
    z-index: 2;
  }

  .front .top-row{
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .mark{
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #ff7a38);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: #131313;
    flex-shrink: 0;
  }

  .eyebrow{
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .name-block{
    margin-top: 6px;
  }

  .name{
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 26px;
    line-height: 1.1;
    letter-spacing: -0.01em;
  }

  .role{
    margin-top: 6px;
    font-size: 12px;
    color: var(--accent-2);
    letter-spacing: 0.02em;
  }

  .front .bottom-row{
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .tagline{
    font-size: 11px;
    color: var(--muted);
    max-width: 60%;
    line-height: 1.5;
  }

  .flip-hint{
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--line);
    padding: 6px 10px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .flip-hint svg{
    width: 11px;
    height: 11px;
  }

  /* ---------- BACK ---------- */
  .back{
    transform: rotateY(180deg);
    z-index: 1;
  }

  .back .heading{
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--accent);
    letter-spacing: 0.01em;
  }

  .contact-list{
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 14px;
  }

  .contact-item{
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12.5px;
    color: var(--text);
  }

  .contact-item .icon{
    width: 26px;
    height: 26px;
    border-radius: 7px;
    background: #131313;
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .contact-item .icon svg{
    width: 13px;
    height: 13px;
    stroke: var(--accent-2);
  }

  .contact-item a{
    color: inherit;
    text-decoration: none;
  }

  .contact-item a:hover{
    color: var(--accent-2);
  }

  .back .bottom-row{
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .back .eyebrow{
    font-size: 10px;
  }

  .qr-hint{
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--line);
    padding: 6px 10px;
    border-radius: 20px;
  }

  .instructions{
    font-size: 10.5px;
    color: var(--muted);
    letter-spacing: 0.03em;
    text-align: center;
  }

  .instructions kbd{
    font-family: 'DM Mono', monospace;
    background: var(--card);
    border: 1px solid var(--line);
    padding: 1px 6px;
    border-radius: 4px;
  }

  @media (prefers-reduced-motion: reduce){
    .card{ transition: none; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="scene" id="scene" tabindex="0" role="button" aria-pressed="false" aria-label="Business card, press to flip">
    <div class="card" id="card">

      <div class="face front">
        <div class="top-row">
          <div class="mark">A</div>
          <div class="eyebrow">Available for work</div>
        </div>

        <div class="name-block">
          <div class="name">Alex Rivera</div>
          <div class="role">Product &amp; Front-End Engineer</div>
        </div>

        <div class="bottom-row">
          <div class="tagline">Building interfaces that feel considered, not templated.</div>
          <div class="flip-hint">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            Flip
          </div>
        </div>
      </div>

      <div class="face back">
        <div>
          <div class="heading">Get in touch</div>
          <div class="contact-list">
            <div class="contact-item">
              <span class="icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z" opacity="0"/><path d="M22 6l-10 7L2 6"/><path d="M2 6h20v12H2z"/></svg>
              </span>
              <a href="mailto:alex@studio.dev">alex@studio.dev</a>
            </div>
            <div class="contact-item">
              <span class="icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.68 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.32 1.85.55 2.81.68A2 2 0 0 1 22 16.92z"/></svg>
              </span>
              <a href="tel:+15555550142">+1 (555) 555-0142</a>
            </div>
            <div class="contact-item">
              <span class="icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
              </span>
              <a href="https://alexrivera.dev" target="_blank" rel="noopener">alexrivera.dev</a>
            </div>
            <div class="contact-item">
              <span class="icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              </span>
              <span>London, UK</span>
            </div>
          </div>
        </div>

        <div class="bottom-row">
          <div class="eyebrow">@alexrivera</div>
          <div class="qr-hint">Tap to flip back</div>
        </div>
      </div>

    </div>
  </div>

  <div class="instructions">Click or tap the card, or press <kbd>Enter</kbd> / <kbd>Space</kbd>, to flip it</div>
</div>

<script>
  const scene = document.getElementById('scene');

  function toggleFlip(){
    const flipped = scene.classList.toggle('flipped');
    scene.setAttribute('aria-pressed', flipped ? 'true' : 'false');
  }

  scene.addEventListener('click', toggleFlip);
  scene.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      toggleFlip();
    }
  });
</script>

</body>
</html>
